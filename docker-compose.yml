services:
  transcription:
    image: ${RUNNER_IMAGE}
    build:
      context: .
    container_name: byoc-transcription
    runtime: nvidia
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${TRANSCRIPTION_CUDA_VISIBLE_DEVICES}
      - HF_TOKEN=${HF_TOKEN}
      - MAX_CONCURRENT_SUMMARIES=${MAX_CONCURRENT_SUMMARIES}
      - LOCAL_REASONING_MODEL_USES_SYSTEM_PROMPT=${LOCAL_REASONING_MODEL_USES_SYSTEM_PROMPT}
      - LOCAL_FAST_MODEL_USES_SYSTEM_PROMPT=${LOCAL_FAST_MODEL_USES_SYSTEM_PROMPT}
    volumes:
      - ./models:/models
    ports:
      - ${AI_RUNNER_PORT}:8000
    depends_on:
      vllm-insights:
        condition: service_healthy
      vllm-fast-summary:
        condition: service_healthy
  vllm-insights:
    image: vllm/vllm-openai:v0.15.1
    container_name: byoc-transcription-vllm-insights
    runtime: nvidia
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${LOCAL_REASONING_VLLM_CUDA_VISIBLE_DEVICES}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      #workaround for bug in vllm v0.15.1, will not be needed when v0.17.0 is released
      #https://github.com/vllm-project/vllm/issues/32373#issuecomment-3963697445
      - LD_LIBRARY_PATH=/lib/x86_64-linux-gnu:/usr/local/cuda/lib64
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - ${LOCAL_REASONING_MODEL_PORT:-5000}:${LOCAL_REASONING_MODEL_PORT:-5000}
    command: >
      --model ${LOCAL_REASONING_MODEL}
      --port ${LOCAL_REASONING_MODEL_PORT:-5000}
      --gpu-memory-utilization 0.60
      --kv-cache-dtype fp8
      --max-num-batched-tokens 512
      --max-num-seqs 10
      --max-model-len 32768
      ${LOCAL_REASONING_MODEL_VLLM_SETTINGS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LOCAL_REASONING_MODEL_PORT:-5000}/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  vllm-fast-summary:
    image: vllm/vllm-openai:v0.15.1
    container_name: byoc-transcription-vllm-fast-summary
    runtime: nvidia
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${LOCAL_FAST_VLLM_CUDA_VISIBLE_DEVICES}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      #workaround for bug in vllm v0.15.1, will not be needed when v0.17.0 is released
      #https://github.com/vllm-project/vllm/issues/32373#issuecomment-3963697445
      - LD_LIBRARY_PATH=/lib/x86_64-linux-gnu:/usr/local/cuda/lib64
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - ${LOCAL_FAST_MODEL_PORT:-5050}:${LOCAL_FAST_MODEL_PORT:-5050}
    command: >
      --model ${LOCAL_FAST_MODEL}
      --port ${LOCAL_FAST_MODEL_PORT:-5050}
      --gpu-memory-utilization 0.17
      --kv-cache-dtype fp8
      --max-num-batched-tokens 512
      --max-num-seqs 2
      --max-model-len 16384
      ${LOCAL_FAST_MODEL_VLLM_SETTINGS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LOCAL_FAST_MODEL_PORT:-5050}/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      vllm-insights:
        condition: service_healthy
networks:
  default:
    name: byoc-runners
    external: true