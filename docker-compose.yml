services:
  register-worker:
    build:
      context: ./register
      dockerfile: Dockerfile.register_worker
    container_name: byoc-transcription-register-worker
    environment:
      - "ORCH_URL=https://${ORCH_SERVICE_ADDR}"
      - "ORCH_SECRET=${ORCH_SECRET}"
      - "CAPABILITY_NAME=${CAPABILITY_NAME}"
      - "CAPABILITY_DESCRIPTION=video analysis"
      - "CAPABILITY_URL=${AI_RUNNER_URL}"
      - "CAPABILITY_PRICE_PER_UNIT=${CAPABILITY_PRICE_PER_UNIT}"
      - "CAPABILITY_PRICE_SCALING=${CAPABILITY_PRICE_SCALING}"
      - "CAPABILITY_CAPACITY=${CAPABILITY_CAPACITY}"
  transcription:
    image: ${RUNNER_IMAGE}
    build:
      context: .
    container_name: byoc-transcription-1
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=${TRANSCRIPTION_CUDA_VISIBLE_DEVICES}
      - HF_TOKEN=${HF_TOKEN}
      - MAX_CONCURRENT_SUMMARIES=${MAX_CONCURRENT_SUMMARIES}
      - LOCAL_REASONING_MODEL_USES_SYSTEM_PROMPT=${LOCAL_REASONING_MODEL_USES_SYSTEM_PROMPT}
      - LOCAL_FAST_MODEL_USES_SYSTEM_PROMPT=${LOCAL_FAST_MODEL_USES_SYSTEM_PROMPT}
    volumes:
      - ./models:/models
      #- ./src:/app/src
    ports:
      - ${AI_RUNNER_PORT}:8000
    depends_on:
      - vllm-insights
      - vllm-fast-summary
  vllm-insights:
    image: vllm/vllm-openai:latest
    container_name: byoc-transcription-vllm-insights
    runtime: nvidia
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${LOCAL_REASONING_VLLM_CUDA_VISIBLE_DEVICES}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - ${LOCAL_REASONING_MODEL_PORT:-5000}:${LOCAL_REASONING_MODEL_PORT:-5000}
    command: >
      --model ${LOCAL_REASONING_MODEL}
      --port ${LOCAL_REASONING_MODEL_PORT:-5000}
      --gpu-memory-utilization 0.59
      --kv-cache-dtype fp8
      --max-num-batched-tokens 512
      --max-num-seqs 10
      --max-model-len 32768
      ${LOCAL_REASONING_MODEL_VLLM_SETTINGS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LOCAL_REASONING_MODEL_PORT:-5000}/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  vllm-fast-summary:
    image: vllm/vllm-openai:latest
    container_name: byoc-transcription-vllm-fast-summary
    runtime: nvidia
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${LOCAL_FAST_VLLM_CUDA_VISIBLE_DEVICES}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - ${LOCAL_FAST_MODEL_PORT:-5050}:${LOCAL_FAST_MODEL_PORT:-5050}
    command: >
      --model ${LOCAL_FAST_MODEL}
      --port ${LOCAL_FAST_MODEL_PORT:-5050}
      --gpu-memory-utilization 0.31
      --kv-cache-dtype fp8
      --max-num-batched-tokens 512
      --max-num-seqs 2
      --max-model-len 16384
      ${LOCAL_FAST_MODEL_VLLM_SETTINGS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LOCAL_FAST_MODEL_PORT:-5050}/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
networks:
  default:
    name: byoc-runners
    external: true